<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحح التلاوة الذكي | Smart Quran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; overflow-x: hidden; }
        .quran-text { font-family: 'Amiri', serif; line-height: 2.2; text-align: justify; text-align-last: center; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #059669; border-radius: 10px; }
        .word-transition { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .blur-mode { filter: blur(6px); opacity: 0.15; }
        @keyframes ripple {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .recording-pulse { animation: ripple 2s infinite; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        const Icons = {
            Mic: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>,
            Stop: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>,
            Book: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/></svg>,
            Eye: (props) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>,
            EyeOff: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>,
            Moon: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>,
            Sun: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        };

        const API_URL = "https://api.alquran.cloud/v1";

        const App = () => {
            const [surahs, setSurahs] = useState([]);
            const [selectedId, setSelectedId] = useState(1);
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isRecording, setIsRecording] = useState(false);
            const [currentIndex, setCurrentIndex] = useState(-1);
            const [errors, setErrors] = useState([]);
            const [isHidden, setIsHidden] = useState(false);
            const [isDark, setIsDark] = useState(false);
            const [showMenu, setShowMenu] = useState(false);
            const [search, setSearch] = useState("");

            const recognitionRef = useRef(null);
            // Use refs for values needed in the event listener to avoid re-binding loops
            const allWordsRef = useRef([]);
            const currentIndexRef = useRef(-1);

            useEffect(() => {
                fetch(`${API_URL}/surah`)
                    .then(r => r.json())
                    .then(d => setSurahs(d.data));
            }, []);

            useEffect(() => {
                setLoading(true);
                fetch(`${API_URL}/surah/${selectedId}`)
                    .then(r => r.json())
                    .then(d => {
                        setData(d.data);
                        const words = d.data.ayahs.flatMap(a => a.text.split(' '));
                        allWordsRef.current = words;
                        setCurrentIndex(-1);
                        currentIndexRef.current = -1;
                        setErrors([]);
                        setLoading(false);
                    });
            }, [selectedId]);

            const clean = (t) => t.replace(/[\u064B-\u065F]/g, "").trim();

            const handleSpeechResult = useCallback((event) => {
                const transcript = Array.from(event.results)
                    .map(r => r[0].transcript)
                    .join(' ');
                
                const spoken = clean(transcript).split(/\s+/);
                const last = spoken[spoken.length - 1];
                if (!last) return;

                const start = currentIndexRef.current + 1;
                const range = allWordsRef.current.slice(start, start + 10);

                let foundIdx = -1;
                range.forEach((word, i) => {
                    const cTarget = clean(word);
                    if (cTarget.includes(last) || last.includes(cTarget)) {
                        foundIdx = start + i;
                    }
                });

                if (foundIdx !== -1) {
                    setCurrentIndex(foundIdx);
                    currentIndexRef.current = foundIdx;
                    const el = document.getElementById(`word-${foundIdx}`);
                    el?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, []);

            const toggleRecording = () => {
                if (isRecording) {
                    recognitionRef.current?.stop();
                    setIsRecording(false);
                } else {
                    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (!Speech) return alert("متصفحك لا يدعم التعرف على الصوت");
                    
                    const rec = new Speech();
                    rec.continuous = true;
                    rec.interimResults = true;
                    rec.lang = 'ar-SA';
                    rec.onresult = handleSpeechResult;
                    rec.onend = () => { if (isRecording) rec.start(); };
                    
                    rec.start();
                    recognitionRef.current = rec;
                    setIsRecording(true);
                }
            };

            return (
                <div className={`min-h-screen ${isDark ? 'bg-slate-900 text-slate-100' : 'bg-slate-50 text-slate-900'}`}>
                    {/* Header */}
                    <header className={`sticky top-0 z-50 p-4 border-b backdrop-blur-md ${isDark ? 'bg-slate-900/80 border-slate-800' : 'bg-white/80 border-slate-200'}`}>
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <button onClick={() => setShowMenu(true)} className="flex items-center gap-2 bg-emerald-600 text-white px-4 py-2 rounded-xl font-bold shadow-lg shadow-emerald-200">
                                <Icons.Book /> {data?.name || "تحميل..."}
                            </button>
                            <div className="flex gap-2">
                                <button onClick={() => setIsHidden(!isHidden)} className={`p-2 rounded-lg ${isHidden ? 'bg-emerald-600 text-white' : 'bg-slate-200 dark:bg-slate-800'}`}>
                                    {isHidden ? <Icons.EyeOff /> : <Icons.Eye />}
                                </button>
                                <button onClick={() => setIsDark(!isDark)} className="p-2 rounded-lg bg-slate-200 dark:bg-slate-800">
                                    {isDark ? <Icons.Sun /> : <Icons.Moon />}
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Surah List Overlay */}
                    {showMenu && (
                        <div className="fixed inset-0 z-[100] bg-black/60 flex justify-end">
                            <div className="w-80 bg-white dark:bg-slate-900 h-full p-6 shadow-2xl flex flex-col animate-slide-right">
                                <div className="flex justify-between mb-6">
                                    <h2 className="text-xl font-bold">فهرس السور</h2>
                                    <button onClick={() => setShowMenu(false)} className="text-red-500 font-bold">إغلاق</button>
                                </div>
                                <input 
                                    className="w-full p-3 rounded-lg bg-slate-100 dark:bg-slate-800 mb-4 border-none outline-none focus:ring-2 focus:ring-emerald-500"
                                    placeholder="ابحث..."
                                    onChange={e => setSearch(e.target.value)}
                                />
                                <div className="overflow-y-auto flex-1 custom-scrollbar">
                                    {surahs.filter(s => s.name.includes(search)).map(s => (
                                        <button 
                                            key={s.number}
                                            onClick={() => { setSelectedId(s.number); setShowMenu(false); }}
                                            className={`w-full text-right p-3 rounded-lg mb-1 transition-colors ${selectedId === s.number ? 'bg-emerald-600 text-white' : 'hover:bg-emerald-50 dark:hover:bg-slate-800'}`}
                                        >
                                            {s.number}. {s.name}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Content Area */}
                    <main className="max-w-4xl mx-auto p-4 py-10 pb-40">
                        {loading ? (
                            <div className="text-center py-20 font-bold text-emerald-600 animate-pulse">جاري فتح المصحف الشريف...</div>
                        ) : (
                            <div className={`p-8 md:p-12 rounded-[2rem] shadow-xl border ${isDark ? 'bg-slate-900/50 border-slate-800' : 'bg-white border-emerald-100'}`}>
                                <h1 className="text-4xl text-center quran-text text-emerald-700 dark:text-emerald-500 mb-10">{data.name}</h1>
                                <div className="quran-text text-3xl md:text-4xl leading-relaxed">
                                    {data.ayahs.map((ayah, ai) => {
                                        const globalOffset = data.ayahs.slice(0, ai).reduce((sum, a) => sum + a.text.split(' ').length, 0);
                                        return (
                                            <span key={ai}>
                                                {ayah.text.split(' ').map((word, wi) => {
                                                    const idx = globalOffset + wi;
                                                    const isRead = idx <= currentIndex;
                                                    return (
                                                        <span 
                                                            key={wi} 
                                                            id={`word-${idx}`}
                                                            className={`word-transition inline-block mx-1 ${isRead ? 'text-emerald-600 font-bold' : (isHidden ? 'blur-mode' : (isDark ? 'text-slate-700' : 'text-slate-200'))}`}
                                                        >
                                                            {word}
                                                        </span>
                                                    );
                                                })}
                                                <span className="inline-flex items-center justify-center w-10 h-10 border-2 border-emerald-200 rounded-full text-lg mx-3 text-emerald-700">
                                                    {ayah.numberInSurah}
                                                </span>
                                            </span>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Floating Button */}
                    <footer className="fixed bottom-10 left-1/2 -translate-x-1/2 w-full max-w-md px-4">
                        <div className={`p-4 rounded-3xl shadow-2xl border flex flex-col items-center gap-4 ${isDark ? 'bg-slate-900/90 border-slate-700' : 'bg-white/90 border-emerald-100'}`}>
                            <div className="w-full h-1 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
                                <div className="h-full bg-emerald-500 transition-all duration-500" style={{ width: `${((currentIndex + 1) / allWordsRef.current.length) * 100}%` }}></div>
                            </div>
                            <button 
                                onClick={toggleRecording}
                                className={`w-20 h-20 rounded-full flex items-center justify-center text-white transition-all transform active:scale-90 ${isRecording ? 'bg-red-500 shadow-red-200 recording-pulse' : 'bg-emerald-600 shadow-emerald-200 hover:scale-105'}`}
                            >
                                {isRecording ? <Icons.Stop /> : <Icons.Mic />}
                            </button>
                            <span className="text-xs font-bold opacity-60 uppercase">{isRecording ? 'جاري الاستماع...' : 'انقر للبدء'}</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
