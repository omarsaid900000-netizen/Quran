<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ترتيل AI - النسخة الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --error: #ef4444; --bg: #0f172a; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: white; touch-action: manipulation; }
        .quran-text { font-family: 'Amiri', serif; line-height: 2.5; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .word { transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); display: inline-block; margin: 0 4px; border-radius: 8px; }
        .word-passed { color: var(--primary); font-weight: 700; filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.4)); }
        .word-error { color: white; background: var(--error); padding: 0 8px; transform: scale(1.1); animation: shake 0.4s ease-in-out; }
        .word-waiting { color: #475569; }
        .word-current { border-bottom: 3px solid var(--primary); animation: pulse 1.5s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0) scale(1.1); } 25% { transform: translateX(-5px) scale(1.1); } 75% { transform: translateX(5px) scale(1.1); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .blur-mode .word-waiting { filter: blur(8px); opacity: 0.2; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        const App = () => {
            const [surahs, setSurahs] = useState([]);
            const [selectedId, setSelectedId] = useState(1);
            const [data, setData] = useState(null);
            const [isReciting, setIsReciting] = useState(false);
            const [activeIdx, setActiveIdx] = useState(-1);
            const [errorIdx, setErrorIdx] = useState(null);
            const [isBlur, setIsBlur] = useState(false);
            const [loading, setLoading] = useState(true);
            const [lastWordHeard, setLastWordHeard] = useState("");

            const recognitionRef = useRef(null);
            const wordsRef = useRef([]);
            const activeIdxRef = useRef(-1);
            const audioCtx = useRef(null);

            // صوت تنبيه خفيف جداً عند الخطأ
            const playErrorTone = () => {
                if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.current.createOscillator();
                const gain = audioCtx.current.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.current.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, audioCtx.current.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.current.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.current.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.current.currentTime + 0.2);
            };

            const triggerVibrate = () => {
                if (navigator.vibrate) {
                    navigator.vibrate([100, 50, 100]); // اهتزاز مزدوج قوي
                }
                playErrorTone();
            };

            useEffect(() => {
                fetch("https://api.alquran.cloud/v1/surah").then(r => r.json()).then(d => setSurahs(d.data));
            }, []);

            useEffect(() => {
                setLoading(true);
                fetch(`https://api.alquran.cloud/v1/surah/${selectedId}`)
                    .then(r => r.json())
                    .then(d => {
                        setData(d.data);
                        wordsRef.current = d.data.ayahs.flatMap(a => a.text.split(' '));
                        activeIdxRef.current = -1;
                        setActiveIdx(-1);
                        setErrorIdx(null);
                        setLoading(false);
                    });
            }, [selectedId]);

            const normalize = (t) => t ? t.replace(/[\u064B-\u065F]/g, "").replace(/[أإآ]/g, "ا").replace(/ة/g, "ه").replace(/ى/g, "ي").trim() : "";

            const handleSpeech = useCallback((event) => {
                // التقاط النتائج اللحظية (Interim) للسرعة القصوى
                let transcript = "";
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }

                const spoken = transcript.trim().split(/\s+/);
                const last = normalize(spoken[spoken.length - 1]);
                if (!last) return;

                setLastWordHeard(last);

                // البحث في نافذة ذكية (الكلمات الـ 8 التالية)
                const start = activeIdxRef.current + 1;
                const lookahead = 8;
                let foundIdx = -1;

                for (let i = start; i < Math.min(start + lookahead, wordsRef.current.length); i++) {
                    const target = normalize(wordsRef.current[i]);
                    if (target === last || target.includes(last) || last.includes(target)) {
                        foundIdx = i;
                        break;
                    }
                }

                if (foundIdx !== -1) {
                    setActiveIdx(foundIdx);
                    activeIdxRef.current = foundIdx;
                    setErrorIdx(null);
                    // تمرير تلقائي فوري
                    document.getElementById(`w-${foundIdx}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else if (last.length > 2) {
                    // إذا نطق كلمة ولم يجدها في النافذة القادمة -> خطأ
                    setErrorIdx(activeIdxRef.current + 1);
                    triggerVibrate();
                }
            }, []);

            const toggleReciting = () => {
                if (isReciting) {
                    recognitionRef.current?.stop();
                    setIsReciting(false);
                } else {
                    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (!Speech) return alert("المتصفح لا يدعم التعرف على الصوت");
                    
                    const rec = new Speech();
                    rec.continuous = true;
                    rec.interimResults = true; // تفعيل النتائج اللحظية للسرعة
                    rec.lang = 'ar-SA';
                    rec.onresult = handleSpeech;
                    rec.onend = () => { if (isReciting) rec.start(); };
                    rec.onerror = () => setIsReciting(false);
                    
                    rec.start();
                    recognitionRef.current = rec;
                    setIsReciting(true);
                    setErrorIdx(null);
                }
            };

            return (
                <div className="flex flex-col h-screen overflow-hidden">
                    {/* Top Bar */}
                    <header className="p-4 flex justify-between items-center border-b border-slate-800 bg-slate-900 shadow-xl">
                        <button onClick={() => window.location.reload()} className="text-emerald-500 font-black text-2xl tracking-tighter">ترتيل AI</button>
                        <div className="flex gap-2">
                            <select 
                                value={selectedId} 
                                onChange={e => setSelectedId(e.target.value)}
                                className="bg-slate-800 text-white p-2 rounded-lg font-bold border-none outline-none"
                            >
                                {surahs.map(s => <option key={s.number} value={s.number}>{s.name}</option>)}
                            </select>
                            <button 
                                onClick={() => setIsBlur(!isBlur)}
                                className={`p-2 rounded-lg ${isBlur ? 'bg-emerald-600' : 'bg-slate-800'}`}
                            >
                                {isBlur ? 'عرض' : 'إخفاء'}
                            </button>
                        </div>
                    </header>

                    {/* Main Quran View */}
                    <main className={`flex-1 overflow-y-auto p-6 md:p-12 custom-scrollbar ${isBlur ? 'blur-mode' : ''}`}>
                        {loading ? (
                            <div className="h-full flex items-center justify-center font-bold text-emerald-500 animate-pulse text-xl">جاري تحميل الوحي...</div>
                        ) : (
                            <div className="quran-text text-4xl md:text-6xl text-right dir-rtl">
                                {data?.ayahs.map((ayah, ai) => {
                                    const offset = data.ayahs.slice(0, ai).reduce((s, a) => s + a.text.split(' ').length, 0);
                                    return (
                                        <span key={ai} className="inline">
                                            {ayah.text.split(' ').map((word, wi) => {
                                                const idx = offset + wi;
                                                const status = idx <= activeIdx ? 'passed' : (idx === errorIdx ? 'error' : (idx === activeIdx + 1 && isReciting ? 'current' : 'waiting'));
                                                return (
                                                    <span 
                                                        key={wi} 
                                                        id={`w-${idx}`}
                                                        className={`word word-${status}`}
                                                    >
                                                        {word}
                                                    </span>
                                                );
                                            })}
                                            <span className="inline-flex items-center justify-center w-14 h-14 border-2 border-emerald-900 rounded-full text-2xl mx-6 text-emerald-600 font-bold bg-slate-900/50">
                                                {ayah.numberInSurah}
                                            </span>
                                        </span>
                                    );
                                })}
                            </div>
                        )}
                    </main>

                    {/* Bottom Control Panel */}
                    <footer className="p-6 bg-slate-900 border-t border-slate-800 shadow-2xl">
                        <div className="max-w-xl mx-auto flex flex-col items-center gap-4">
                            
                            {/* Instant Feedback Monitor */}
                            <div className="w-full flex items-center gap-3 bg-slate-950 p-3 rounded-2xl border border-slate-800">
                                <div className={`w-3 h-3 rounded-full ${isReciting ? 'bg-red-500 animate-ping' : 'bg-slate-700'}`}></div>
                                <span className="text-[10px] font-black text-slate-500 uppercase">ما التقطه النظام:</span>
                                <span className="text-emerald-400 font-bold text-sm truncate">{lastWordHeard || "في انتظار صوتك..."}</span>
                            </div>

                            <div className="flex items-center justify-between w-full">
                                <div className="text-right">
                                    <p className="text-[10px] text-slate-500 font-bold">الحفظ</p>
                                    <p className="text-2xl font-black text-emerald-500">%{Math.round(((activeIdx + 1) / (wordsRef.current.length || 1)) * 100)}</p>
                                </div>

                                <button 
                                    onClick={toggleReciting}
                                    className={`w-20 h-20 rounded-full flex items-center justify-center text-white transition-all transform active:scale-90 shadow-2xl ${isReciting ? 'bg-red-600 scale-110' : 'bg-emerald-600 hover:scale-105'}`}
                                >
                                    {isReciting ? (
                                        <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                                    ) : (
                                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                                    )}
                                </button>

                                <button 
                                    onClick={() => { activeIdxRef.current = -1; setActiveIdx(-1); setErrorIdx(null); setLastWordHeard(""); }}
                                    className="p-4 bg-slate-800 text-slate-400 rounded-2xl hover:text-white transition-all"
                                >
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                                </button>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
