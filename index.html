<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحح التلاوة الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .quran-font { font-family: 'Amiri', serif; }
        .word-active { color: #059669; font-weight: bold; transform: scale(1.1); transition: all 0.2s ease; }
        .word-error { color: #dc2626; background: #fee2e2; border-radius: 4px; padding: 0 4px; animation: shake 0.5s ease-in-out; }
        .word-waiting { color: #94a3b8; opacity: 0.4; }
        .word-blur { filter: blur(5px); opacity: 0.1; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .mic-listening { animation: pulse-green 2s infinite; }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const API_BASE = "https://api.alquran.cloud/v1";

        const App = () => {
            const [surahs, setSurahs] = useState([]);
            const [selectedSurah, setSelectedSurah] = useState(1);
            const [surahData, setSurahData] = useState(null);
            const [isListening, setIsListening] = useState(false);
            const [currentWordIdx, setCurrentWordIdx] = useState(-1);
            const [mistakeIdx, setMistakeIdx] = useState(null);
            const [lastHeard, setLastHeard] = useState("");
            const [isHidden, setIsHidden] = useState(false);
            const [isLoading, setIsLoading] = useState(true);

            const recognitionRef = useRef(null);
            const wordsRef = useRef([]);

            // تنظيف النصوص العربية للمقارنة الذكية
            const normalize = (text) => {
                if (!text) return "";
                return text
                    .replace(/[\u064B-\u065F]/g, "") // إزالة التشكيل
                    .replace(/[أإآ]/g, "ا") // توحيد الألف
                    .replace(/ة/g, "ه") // توحيد التاء المربوطة
                    .replace(/ى/g, "ي") // توحيد الياء
                    .trim();
            };

            // تحميل بيانات السور
            useEffect(() => {
                fetch(`${API_BASE}/surah`).then(r => r.json()).then(d => setSurahs(d.data));
            }, []);

            useEffect(() => {
                setIsLoading(true);
                fetch(`${API_BASE}/surah/${selectedSurah}`)
                    .then(r => r.json())
                    .then(d => {
                        setSurahData(d.data);
                        wordsRef.current = d.data.ayahs.flatMap(a => a.text.split(' '));
                        setCurrentWordIdx(-1);
                        setMistakeIdx(null);
                        setIsLoading(false);
                    });
            }, [selectedSurah]);

            // محرك التعرف على الصوت
            const startListening = () => {
                const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!Speech) return alert("المتصفح لا يدعم التعرف على الصوت");

                recognitionRef.current = new Speech();
                recognitionRef.current.continuous = true;
                recognitionRef.current.interimResults = true;
                recognitionRef.current.lang = 'ar-SA';

                recognitionRef.current.onresult = (event) => {
                    const result = event.results[event.results.length - 1];
                    const transcript = result[0].transcript.trim();
                    setLastHeard(transcript);

                    if (result.isFinal) {
                        const spokenWords = transcript.split(/\s+/);
                        spokenWords.forEach(word => matchWord(word));
                    }
                };

                recognitionRef.current.onend = () => {
                    if (isListening) recognitionRef.current.start();
                };

                recognitionRef.current.start();
                setIsListening(true);
            };

            const stopListening = () => {
                if (recognitionRef.current) {
                    recognitionRef.current.stop();
                    setIsListening(false);
                }
            };

            const matchWord = (spokenWord) => {
                const cleanedSpoken = normalize(spokenWord);
                if (!cleanedSpoken) return;

                // نبحث في الكلمات الـ 10 القادمة من الموضع الحالي
                const searchStart = currentWordIdx + 1;
                const searchEnd = Math.min(searchStart + 10, wordsRef.current.length);
                
                let foundMatch = false;
                for (let i = searchStart; i < searchEnd; i++) {
                    const targetWord = normalize(wordsRef.current[i]);
                    if (targetWord === cleanedSpoken || targetWord.includes(cleanedSpoken) || cleanedSpoken.includes(targetWord)) {
                        setCurrentWordIdx(i);
                        setMistakeIdx(null);
                        foundMatch = true;
                        
                        // التمرير التلقائي
                        const el = document.getElementById(`w-${i}`);
                        el?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        break;
                    }
                }

                if (!foundMatch && cleanedSpoken.length > 2) {
                    // إذا لم يجد تطابق، نعتبره خطأ في الكلمة الحالية المتوقعة
                    setMistakeIdx(currentWordIdx + 1);
                    if (navigator.vibrate) navigator.vibrate(200);
                }
            };

            return (
                <div className="min-h-screen bg-white text-slate-900 pb-40">
                    {/* Header */}
                    <header className="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b p-4 px-6 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-emerald-600 rounded-lg flex items-center justify-center text-white font-bold">ق</div>
                            <select 
                                className="bg-slate-100 p-2 rounded-lg font-bold outline-none border-none"
                                value={selectedSurah}
                                onChange={(e) => setSelectedSurah(e.target.value)}
                            >
                                {surahs.map(s => <option key={s.number} value={s.number}>{s.name}</option>)}
                            </select>
                        </div>
                        <button 
                            onClick={() => setIsHidden(!isHidden)}
                            className={`p-2 rounded-full ${isHidden ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100'}`}
                        >
                            {isHidden ? "إظهار النص" : "تسميع (إخفاء)"}
                        </button>
                    </header>

                    {/* Mushaf Area */}
                    <main className="max-w-3xl mx-auto p-6 md:p-12">
                        {isLoading ? (
                            <div className="text-center py-20 animate-pulse text-emerald-600 font-bold">جاري التحميل...</div>
                        ) : (
                            <div className="quran-font text-3xl md:text-5xl leading-[4rem] md:leading-[5.5rem] text-right">
                                {surahData?.ayahs.map((ayah, ai) => {
                                    const offset = surahData.ayahs.slice(0, ai).reduce((s, a) => s + a.text.split(' ').length, 0);
                                    return (
                                        <span key={ai}>
                                            {ayah.text.split(' ').map((word, wi) => {
                                                const idx = offset + wi;
                                                const isDone = idx <= currentWordIdx;
                                                const isMistake = mistakeIdx === idx;
                                                const isNext = idx === currentWordIdx + 1;

                                                return (
                                                    <span 
                                                        key={wi} 
                                                        id={`w-${idx}`}
                                                        className={`inline-block mx-1.5 transition-all duration-300
                                                            ${isDone ? 'text-emerald-600 font-bold scale-105' : ''}
                                                            ${isMistake ? 'word-error' : ''}
                                                            ${isNext && isListening ? 'border-b-4 border-emerald-400' : ''}
                                                            ${!isDone && isHidden ? 'word-blur' : (!isDone ? 'word-waiting' : '')}
                                                        `}
                                                    >
                                                        {word}
                                                    </span>
                                                );
                                            })}
                                            <span className="inline-flex items-center justify-center w-12 h-12 border-2 border-emerald-200 rounded-full text-xl mx-4 text-emerald-700 font-bold">
                                                {ayah.numberInSurah}
                                            </span>
                                        </span>
                                    );
                                })}
                            </div>
                        )}
                    </main>

                    {/* Monitoring & Controls */}
                    <footer className="fixed bottom-0 left-0 right-0 p-6 z-50">
                        <div className="max-w-xl mx-auto bg-white shadow-[0_-10px_40px_rgba(0,0,0,0.1)] rounded-3xl p-4 border border-slate-100">
                            
                            {/* Live Transcript (Feedback to user) */}
                            <div className="mb-4 flex items-center gap-3 bg-slate-50 p-3 rounded-2xl border border-dashed border-slate-200">
                                <div className={`w-2 h-2 rounded-full ${isListening ? 'bg-red-500 animate-pulse' : 'bg-slate-300'}`}></div>
                                <span className="text-xs font-bold text-slate-400 min-w-[60px]">أسمع الآن:</span>
                                <span className="text-emerald-700 font-bold text-sm truncate">{lastHeard || "ابدأ القراءة ليظهر ما أسمعه هنا..."}</span>
                            </div>

                            <div className="flex items-center justify-between">
                                <div className="text-right">
                                    <p className="text-[10px] text-slate-400 font-bold uppercase">التقدم</p>
                                    <p className="text-lg font-bold text-emerald-600">%{Math.round(((currentWordIdx + 1) / (wordsRef.current.length || 1)) * 100)}</p>
                                </div>

                                <button 
                                    onClick={isListening ? stopListening : startListening}
                                    className={`w-16 h-16 rounded-full flex items-center justify-center text-white transition-all transform active:scale-90 ${isListening ? 'bg-red-500 mic-listening' : 'bg-emerald-600 shadow-lg shadow-emerald-200'}`}
                                >
                                    {isListening ? (
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                                    ) : (
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                                    )}
                                </button>

                                <button 
                                    onClick={() => { setCurrentWordIdx(-1); setMistakeIdx(null); setLastHeard(""); }}
                                    className="p-3 bg-slate-100 text-slate-500 rounded-2xl hover:bg-slate-200 transition-colors"
                                >
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                                </button>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
