<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحح التلاوة الذكي | Smart Quran Corrector</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .quran-font { font-family: 'Amiri', serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        .blur-word { filter: blur(8px); opacity: 0.3; }
        .active-word { transform: scale(1.1); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 transition-colors duration-500">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        
        // Icons components using Lucide
        const Icon = ({ name, size = 24, className = "" }) => {
            const [icon, setIcon] = useState(null);
            useEffect(() => {
                if (window.lucide) {
                    const iconElement = window.lucide.icons[name];
                    if (iconElement) setIcon(name);
                }
            }, [name]);
            
            return icon ? <i data-lucide={name} className={className} style={{ width: size, height: size }}></i> : null;
        };

        const QURAN_API_BASE = "https://api.alquran.cloud/v1";

        const App = () => {
            const [surahs, setSurahs] = useState([]);
            const [selectedSurahNum, setSelectedSurahNum] = useState(1);
            const [surahData, setSurahData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isRecording, setIsRecording] = useState(false);
            const [currentWordIndex, setCurrentWordIndex] = useState(-1);
            const [mistakes, setMistakes] = useState([]);
            const [isHiddenMode, setIsHiddenMode] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [showSurahList, setShowSurahList] = useState(false);
            const [searchQuery, setSearchQuery] = useState("");

            const recognitionRef = useRef(null);

            useEffect(() => {
                fetch(`${QURAN_API_BASE}/surah`)
                    .then(res => res.json())
                    .then(data => setSurahs(data.data));
                
                // Initialize Lucide icons
                setTimeout(() => window.lucide.createIcons(), 500);
            }, []);

            useEffect(() => {
                setLoading(true);
                fetch(`${QURAN_API_BASE}/surah/${selectedSurahNum}`)
                    .then(res => res.json())
                    .then(data => {
                        setSurahData(data.data);
                        setLoading(false);
                        resetSession();
                        setTimeout(() => window.lucide.createIcons(), 100);
                    });
            }, [selectedSurahNum]);

            const allWords = useMemo(() => {
                if (!surahData) return [];
                return surahData.ayahs.map(ayah => ayah.text.split(' ')).flat();
            }, [surahData]);

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'ar-SA';

                    recognitionRef.current.onresult = (event) => {
                        const transcript = Array.from(event.results)
                            .map(result => result[0].transcript)
                            .join(' ');
                        processSpeech(transcript);
                    };

                    recognitionRef.current.onend = () => {
                        if (isRecording) {
                            try { recognitionRef.current.start(); } catch (e) {}
                        }
                    };
                }
            }, [isRecording, allWords, currentWordIndex]);

            const clean = (text) => text.replace(/[\u064B-\u065F]/g, "").trim();

            const processSpeech = (transcript) => {
                const spoken = clean(transcript).split(/\s+/);
                const lastWord = spoken[spoken.length - 1];
                if (!lastWord || allWords.length === 0) return;

                const searchRange = 6;
                const startSearch = currentWordIndex + 1;
                const sliceToCheck = allWords.slice(startSearch, startSearch + searchRange);

                let matchIdx = -1;
                sliceToCheck.forEach((target, i) => {
                    const cleanedTarget = clean(target);
                    if (cleanedTarget.includes(lastWord) || lastWord.includes(cleanedTarget)) {
                        matchIdx = startSearch + i;
                    }
                });

                if (matchIdx !== -1) {
                    setCurrentWordIndex(matchIdx);
                    const el = document.getElementById(`word-${matchIdx}`);
                    el?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else if (lastWord.length > 3) {
                    if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
                    if (!mistakes.includes(startSearch)) setMistakes(p => [...p, startSearch]);
                }
            };

            const resetSession = () => {
                setCurrentWordIndex(-1);
                setMistakes([]);
            };

            const toggleRecording = () => {
                if (isRecording) {
                    recognitionRef.current?.stop();
                } else {
                    resetSession();
                    recognitionRef.current?.start();
                }
                setIsRecording(!isRecording);
            };

            return (
                <div className={`${isDarkMode ? 'bg-[#0f172a] text-slate-200' : 'bg-[#fcfdfd] text-slate-900'} min-h-screen transition-colors duration-500`}>
                    
                    {/* Surah List Modal */}
                    {showSurahList && (
                        <div className="fixed inset-0 z-[100] bg-black/50 backdrop-blur-sm flex justify-end">
                            <div className="w-full max-w-md bg-white dark:bg-slate-900 h-full p-6 shadow-2xl animate-slide-in">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-bold dark:text-white">الفهرس</h3>
                                    <button onClick={() => setShowSurahList(false)} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full">
                                        <i data-lucide="x" className="w-6 h-6"></i>
                                    </button>
                                </div>
                                <input 
                                    type="text" 
                                    placeholder="ابحث عن سورة..."
                                    className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none focus:ring-2 focus:ring-emerald-500 mb-4"
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                                <div className="overflow-y-auto h-[calc(100vh-200px)] space-y-2 custom-scrollbar">
                                    {surahs.filter(s => s.name.includes(searchQuery)).map(s => (
                                        <button 
                                            key={s.number}
                                            onClick={() => { setSelectedSurahNum(s.number); setShowSurahList(false); }}
                                            className={`w-full flex justify-between items-center p-4 rounded-2xl transition-all ${selectedSurahNum === s.number ? 'bg-emerald-600 text-white' : 'hover:bg-emerald-50 dark:hover:bg-slate-800'}`}
                                        >
                                            <span className="font-bold">{s.number}. {s.name}</span>
                                            <span className="text-xs opacity-60">{s.numberOfAyahs} آية</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <header className={`sticky top-0 z-40 backdrop-blur-md border-b ${isDarkMode ? 'bg-slate-900/80 border-slate-800' : 'bg-white/80 border-emerald-50'} p-4`}>
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <button onClick={() => setShowSurahList(true)} className="flex items-center gap-2 bg-emerald-600 text-white px-5 py-2.5 rounded-2xl shadow-lg shadow-emerald-200 active:scale-95 transition-all">
                                <i data-lucide="book" className="w-5 h-5"></i>
                                <span className="font-bold">{surahData?.name || "تحميل..."}</span>
                            </button>
                            <div className="flex gap-2">
                                <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-3 rounded-2xl bg-slate-100 dark:bg-slate-800">
                                    {isDarkMode ? <i data-lucide="sun" className="text-amber-400"></i> : <i data-lucide="moon" className="text-slate-600"></i>}
                                </button>
                                <button onClick={() => setIsHiddenMode(!isHiddenMode)} className={`p-3 rounded-2xl ${isHiddenMode ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 dark:bg-slate-800'}`}>
                                    <i data-lucide={isHiddenMode ? "eye-off" : "eye"}></i>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Content */}
                    <main className="max-w-5xl mx-auto px-6 py-10 pb-48">
                        {loading ? (
                            <div className="flex flex-col items-center justify-center py-20 gap-4">
                                <div className="w-12 h-12 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin"></div>
                                <p className="text-emerald-600 font-bold">جاري تحميل المصحف الشريف...</p>
                            </div>
                        ) : (
                            <div className={`p-8 md:p-16 rounded-[3rem] shadow-2xl border ${isDarkMode ? 'bg-slate-900/40 border-slate-800' : 'bg-white border-emerald-50'}`}>
                                <div className="text-center mb-16">
                                    <h2 className="text-5xl quran-font text-emerald-700 mb-4">{surahData?.name}</h2>
                                    <p className="text-slate-400 text-sm tracking-widest uppercase">سورة {surahData?.revelationType === 'Meccan' ? 'مكية' : 'مدنية'} • {surahData?.numberOfAyahs} آيات</p>
                                </div>
                                <div className="flex flex-wrap justify-center gap-y-12 leading-[4.5rem] text-right">
                                    {surahData?.ayahs.map((ayah, aIdx) => (
                                        <div key={aIdx} className="inline">
                                            {ayah.text.split(' ').map((word, wIdx) => {
                                                const gIdx = surahData.ayahs.slice(0, aIdx).reduce((acc, curr) => acc + curr.text.split(' ').length, 0) + wIdx;
                                                const isRead = gIdx <= currentWordIndex;
                                                const isNext = gIdx === currentWordIndex + 1;
                                                const hasErr = mistakes.includes(gIdx);
                                                return (
                                                    <span key={wIdx} id={`word-${gIdx}`} className={`
                                                        relative inline-block px-1.5 mx-0.5 text-4xl md:text-5xl quran-font transition-all duration-500
                                                        ${isRead ? 'text-emerald-600 font-bold' : (isHiddenMode ? 'blur-word' : (isDarkMode ? 'text-slate-700' : 'text-slate-200'))}
                                                        ${isNext && isRecording ? 'ring-2 ring-emerald-400 ring-offset-4 ring-offset-transparent animate-pulse rounded-lg' : ''}
                                                        ${hasErr ? 'text-red-500 bg-red-50 rounded-lg' : ''}
                                                    `}>
                                                        {word}
                                                    </span>
                                                );
                                            })}
                                            <span className="inline-flex items-center justify-center w-12 h-12 mx-4 border-2 border-emerald-100 rounded-full text-emerald-700 font-bold text-xl bg-emerald-50/50">
                                                {ayah.numberInSurah}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Controls Footer */}
                    <footer className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-xl z-50">
                        <div className={`p-6 rounded-[2.5rem] shadow-2xl backdrop-blur-xl border flex flex-col items-center gap-6 ${isDarkMode ? 'bg-slate-900/90 border-slate-700' : 'bg-white/90 border-emerald-100'}`}>
                            <div className="w-full flex justify-between items-center px-2">
                                <div className={`flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-bold ${mistakes.length > 0 ? 'bg-red-100 text-red-600' : 'bg-emerald-100 text-emerald-600'}`}>
                                    <div className={`w-2 h-2 rounded-full ${isRecording ? 'animate-pulse bg-current' : 'bg-current'}`}></div>
                                    {isRecording ? 'جاري الاستماع...' : 'اضغط للبدء'}
                                </div>
                                <button onClick={resetSession} className="text-xs font-bold text-slate-400 hover:text-emerald-600 flex items-center gap-1 transition-colors">
                                    <i data-lucide="rotate-ccw" className="w-3 h-3"></i> إعادة التصفير
                                </button>
                            </div>
                            
                            <div className="flex items-center justify-center gap-8">
                                <button onClick={() => setSelectedSurahNum(p => Math.max(1, p-1))} className="p-4 text-slate-400 hover:text-emerald-600"><i data-lucide="chevron-right"></i></button>
                                <button 
                                    onClick={toggleRecording}
                                    className={`w-24 h-24 rounded-full flex items-center justify-center shadow-2xl transition-all active:scale-90 ${isRecording ? 'bg-red-500 shadow-red-200 rotate-180' : 'bg-emerald-600 shadow-emerald-200 hover:scale-105'}`}
                                >
                                    <i data-lucide={isRecording ? "mic-off" : "mic"} className="w-10 h-10 text-white"></i>
                                </button>
                                <button onClick={() => setSelectedSurahNum(p => Math.min(114, p+1))} className="p-4 text-slate-400 hover:text-emerald-600"><i data-lucide="chevron-left"></i></button>
                            </div>
                            <div className="w-full h-1 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                                <div className="h-full bg-emerald-500 transition-all duration-700" style={{ width: `${((currentWordIndex + 1) / (allWords.length || 1)) * 100}%` }}></div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Helper to update icons whenever the DOM changes
        const observer = new MutationObserver(() => {
            if (window.lucide) window.lucide.createIcons();
        });
        observer.observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
</body>
</html>
