<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحح التلاوة الذكي | Smart Quran</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (Stable Versions) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; transition: background-color 0.3s ease; }
        .quran-font { font-family: 'Amiri', serif; line-height: 2; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #059669; border-radius: 10px; }
        .blur-word { filter: blur(6px); opacity: 0.2; }
        .ayah-end { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            width: 35px; 
            height: 35px; 
            border: 2px solid #10b981; 
            border-radius: 50%; 
            margin: 0 10px; 
            font-size: 0.8em; 
            font-weight: bold;
            color: #047857;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        .mic-active::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 4px solid #ef4444;
            animation: pulse-ring 1.5s infinite;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Inline SVG Icons for maximum stability on GitHub Pages
        const Icons = {
            Mic: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>,
            MicOff: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="2" x2="22" y1="2" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/><path d="M15 9.34V5a3 3 0 0 0-5.94-.6"/><path d="M12 19v3"/><line x1="9" x2="15" y1="22" y2="22"/></svg>,
            Book: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></svg>,
            Moon: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>,
            Sun: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>,
            Eye: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>,
            EyeOff: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>,
            Rotate: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
        };

        const QURAN_API_BASE = "https://api.alquran.cloud/v1";

        const App = () => {
            const [surahs, setSurahs] = useState([]);
            const [selectedSurahNum, setSelectedSurahNum] = useState(1);
            const [surahData, setSurahData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isRecording, setIsRecording] = useState(false);
            const [currentWordIndex, setCurrentWordIndex] = useState(-1);
            const [mistakes, setMistakes] = useState([]);
            const [isHiddenMode, setIsHiddenMode] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [showSurahList, setShowSurahList] = useState(false);
            const [searchQuery, setSearchQuery] = useState("");
            const [errorMessage, setErrorMessage] = useState("");

            const recognitionRef = useRef(null);

            // Fetch All Surahs
            useEffect(() => {
                fetch(`${QURAN_API_BASE}/surah`)
                    .then(res => res.json())
                    .then(data => setSurahs(data.data))
                    .catch(err => setErrorMessage("فشل الاتصال بخادم القرآن. تحقق من الإنترنت."));
            }, []);

            // Fetch Single Surah
            useEffect(() => {
                setLoading(true);
                setErrorMessage("");
                fetch(`${QURAN_API_BASE}/surah/${selectedSurahNum}`)
                    .then(res => res.json())
                    .then(data => {
                        if(data.data) {
                            setSurahData(data.data);
                            setLoading(false);
                            resetSession();
                        }
                    })
                    .catch(err => {
                        setLoading(false);
                        setErrorMessage("حدث خطأ أثناء تحميل السورة.");
                    });
            }, [selectedSurahNum]);

            const allWords = useMemo(() => {
                if (!surahData) return [];
                return surahData.ayahs.map(ayah => ayah.text.split(' ')).flat();
            }, [surahData]);

            // Speech Recognition Setup
            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    setErrorMessage("متصفحك لا يدعم خاصية التعرف على الصوت. استخدم متصفح Chrome.");
                    return;
                }

                recognitionRef.current = new SpeechRecognition();
                recognitionRef.current.continuous = true;
                recognitionRef.current.interimResults = true;
                recognitionRef.current.lang = 'ar-SA';

                recognitionRef.current.onresult = (event) => {
                    const transcript = Array.from(event.results)
                        .map(result => result[0].transcript)
                        .join(' ');
                    processSpeech(transcript);
                };

                recognitionRef.current.onend = () => {
                    if (isRecording) {
                        try { recognitionRef.current.start(); } catch (e) {}
                    }
                };

                return () => recognitionRef.current?.stop();
            }, [isRecording, allWords, currentWordIndex]);

            const clean = (text) => text.replace(/[\u064B-\u065F]/g, "").trim();

            const processSpeech = (transcript) => {
                const spoken = clean(transcript).split(/\s+/);
                const lastWord = spoken[spoken.length - 1];
                if (!lastWord || allWords.length === 0) return;

                const searchRange = 8;
                const startSearch = currentWordIndex + 1;
                const sliceToCheck = allWords.slice(startSearch, startSearch + searchRange);

                let matchIdx = -1;
                sliceToCheck.forEach((target, i) => {
                    const cleanedTarget = clean(target);
                    if (cleanedTarget.includes(lastWord) || lastWord.includes(cleanedTarget)) {
                        matchIdx = startSearch + i;
                    }
                });

                if (matchIdx !== -1) {
                    setCurrentWordIndex(matchIdx);
                    const el = document.getElementById(`word-${matchIdx}`);
                    el?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else if (lastWord.length > 3) {
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                    if (!mistakes.includes(startSearch)) setMistakes(p => [...p, startSearch]);
                }
            };

            const resetSession = () => {
                setCurrentWordIndex(-1);
                setMistakes([]);
            };

            const toggleRecording = () => {
                if (isRecording) {
                    recognitionRef.current?.stop();
                    setIsRecording(false);
                } else {
                    resetSession();
                    try {
                        recognitionRef.current?.start();
                        setIsRecording(true);
                    } catch(e) {
                        setErrorMessage("فشل تشغيل الميكروفون. تأكد من إعطاء الصلاحية.");
                    }
                }
            };

            return (
                <div className={`${isDarkMode ? 'bg-[#0f172a] text-slate-100' : 'bg-gray-50 text-slate-900'} min-h-screen transition-colors duration-500`}>
                    
                    {/* Error Box */}
                    {errorMessage && (
                        <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[200] bg-red-500 text-white px-6 py-3 rounded-full shadow-xl flex items-center gap-3 animate-bounce">
                           <Icons.X /> {errorMessage}
                           <button onClick={() => setErrorMessage("")} className="bg-red-700 rounded-full p-1">إغلاق</button>
                        </div>
                    )}

                    {/* Surah List Modal */}
                    {showSurahList && (
                        <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex justify-end">
                            <div className="w-full max-w-sm bg-white dark:bg-slate-900 h-full p-6 shadow-2xl flex flex-col">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-bold dark:text-white">فهرس السور</h3>
                                    <button onClick={() => setShowSurahList(false)} className="p-2 hover:bg-red-50 dark:hover:bg-red-900/20 text-red-500 rounded-full transition-colors">
                                        <Icons.X />
                                    </button>
                                </div>
                                <input 
                                    type="text" 
                                    placeholder="ابحث عن سورة..."
                                    className="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-800 border-none outline-none ring-2 ring-transparent focus:ring-emerald-500 mb-4 transition-all"
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                                <div className="overflow-y-auto flex-1 space-y-2 custom-scrollbar pr-2">
                                    {surahs.filter(s => s.name.includes(searchQuery) || s.englishName.toLowerCase().includes(searchQuery.toLowerCase())).map(s => (
                                        <button 
                                            key={s.number}
                                            onClick={() => { setSelectedSurahNum(s.number); setShowSurahList(false); }}
                                            className={`w-full flex justify-between items-center p-4 rounded-xl transition-all ${selectedSurahNum === s.number ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-200' : 'hover:bg-emerald-50 dark:hover:bg-slate-800'}`}
                                        >
                                            <span className="font-bold">{s.number}. {s.name}</span>
                                            <span className="text-xs opacity-60">{s.numberOfAyahs} آية</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <header className={`sticky top-0 z-40 backdrop-blur-lg border-b ${isDarkMode ? 'bg-slate-900/80 border-slate-800' : 'bg-white/80 border-emerald-50'} p-4 shadow-sm`}>
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <button onClick={() => setShowSurahList(true)} className="flex items-center gap-2 bg-emerald-600 text-white px-4 py-2 rounded-xl font-bold shadow-lg hover:bg-emerald-700 transition-all active:scale-95">
                                <Icons.Book /> {surahData?.name || "تحميل..."}
                            </button>
                            <div className="flex gap-3">
                                <button onClick={() => setIsHiddenMode(!isHiddenMode)} className={`p-2.5 rounded-xl transition-all ${isHiddenMode ? 'bg-emerald-600 text-white' : 'bg-gray-100 dark:bg-slate-800'}`}>
                                    {isHiddenMode ? <Icons.EyeOff /> : <Icons.Eye />}
                                </button>
                                <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2.5 rounded-xl bg-gray-100 dark:bg-slate-800">
                                    {isDarkMode ? <Icons.Sun /> : <Icons.Moon />}
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-4xl mx-auto px-4 py-8 pb-48">
                        {loading ? (
                            <div className="flex flex-col items-center justify-center py-20">
                                <div className="w-14 h-14 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin"></div>
                                <p className="mt-4 text-emerald-600 font-bold animate-pulse text-lg">باسم الله، نفتح المصحف...</p>
                            </div>
                        ) : (
                            <div className={`p-6 md:p-12 rounded-[2.5rem] shadow-xl border transition-all ${isDarkMode ? 'bg-slate-900/50 border-slate-800' : 'bg-white border-emerald-100'}`}>
                                <div className="text-center mb-12">
                                    <h2 className="text-5xl quran-font text-emerald-700 dark:text-emerald-500 mb-2">{surahData?.name}</h2>
                                    <div className="h-1 w-20 bg-emerald-100 mx-auto rounded-full"></div>
                                </div>
                                <div className="flex flex-wrap justify-center gap-y-12 text-right">
                                    {surahData?.ayahs.map((ayah, aIdx) => (
                                        <div key={aIdx} className="inline">
                                            {ayah.text.split(' ').map((word, wIdx) => {
                                                const gIdx = surahData.ayahs.slice(0, aIdx).reduce((acc, curr) => acc + curr.text.split(' ').length, 0) + wIdx;
                                                const isRead = gIdx <= currentWordIndex;
                                                const isNext = gIdx === currentWordIndex + 1;
                                                const hasErr = mistakes.includes(gIdx);
                                                return (
                                                    <span key={wIdx} id={`word-${gIdx}`} className={`
                                                        relative inline-block px-1 mx-0.5 text-3xl md:text-5xl quran-font transition-all duration-500 rounded-md
                                                        ${isRead ? 'text-emerald-600 dark:text-emerald-400 font-bold' : (isHiddenMode ? 'blur-word' : (isDarkMode ? 'text-slate-700' : 'text-slate-300'))}
                                                        ${isNext && isRecording ? 'ring-2 ring-emerald-500 ring-offset-4 ring-offset-transparent' : ''}
                                                        ${hasErr ? 'bg-red-100 text-red-600 ring-2 ring-red-400' : ''}
                                                    `}>
                                                        {word}
                                                    </span>
                                                );
                                            })}
                                            <span className="ayah-end">{ayah.numberInSurah}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Bottom Controls */}
                    <footer className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[94%] max-w-lg z-50">
                        <div className={`p-4 rounded-[2rem] shadow-2xl backdrop-blur-xl border border-white/20 flex flex-col items-center gap-4 ${isDarkMode ? 'bg-slate-900/90' : 'bg-white/90'}`}>
                            
                            <div className="w-full flex justify-between items-center px-4">
                                <div className={`flex items-center gap-2 px-3 py-1 rounded-full text-xs font-bold ${isRecording ? 'text-red-500 bg-red-50' : 'text-emerald-600 bg-emerald-50'}`}>
                                    <span className={`w-2 h-2 rounded-full bg-current ${isRecording ? 'animate-pulse' : ''}`}></span>
                                    {isRecording ? 'جاري المتابعة...' : 'جاهز للاستماع'}
                                </div>
                                <button onClick={resetSession} className="text-xs font-bold text-slate-400 hover:text-red-500 flex items-center gap-1">
                                    <Icons.Rotate /> تصفير التقدم
                                </button>
                            </div>

                            <div className="flex items-center justify-center gap-10">
                                <button onClick={() => setSelectedSurahNum(p => Math.max(1, p-1))} className="p-3 text-slate-400 hover:text-emerald-600 transition-colors"><Icons.Book /></button>
                                <button 
                                    onClick={toggleRecording}
                                    className={`relative w-20 h-20 rounded-full flex items-center justify-center shadow-xl transition-all active:scale-90 ${isRecording ? 'bg-red-500 shadow-red-200 mic-active' : 'bg-emerald-600 shadow-emerald-200 hover:scale-105'}`}
                                >
                                    <div className="text-white scale-125">
                                        {isRecording ? <Icons.MicOff /> : <Icons.Mic />}
                                    </div>
                                </button>
                                <button onClick={() => setSelectedSurahNum(p => Math.min(114, p+1))} className="p-3 text-slate-400 hover:text-emerald-600 transition-colors"><Icons.Book /></button>
                            </div>

                            <div className="w-full h-1.5 bg-gray-200 dark:bg-slate-800 rounded-full overflow-hidden">
                                <div className="h-full bg-emerald-500 transition-all duration-700" style={{ width: `${((currentWordIndex + 1) / (allWords.length || 1)) * 100}%` }}></div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
